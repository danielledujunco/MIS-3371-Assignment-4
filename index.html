<!DOCTYPE html>

    Description: Homework 4 HTML - Patient registration form webpage

<html lang="en">
    <head>
        <link rel="stylesheet" href="hw4.css"> <!-- links to css file -->

        <!-- displays text in the browser's tab -->

        <title>New Patient Registration | Summit Grove Medical</title>
    </head>
    <body>
        <header>
            <table width="100%">
                <tr>
                    <td valign="top" align="left" width="20%">
                        <div class="image">
                           <img align="center" src="summitgrovelogo.png" alt="Summit Grove Logo" width="70px" id="logo"/>
                        </div>
                    </td>

                    <td>
                        <h2>Summit Grove Medical</h2>
                    </td>

                    <td valign="bottom" align="right" width="20%">
                     <p>Today's Date: <span id= "today"></span></p>
                    </td>
                </tr>
            </table>
        </header>
<hr>

<!-- welcome message -->
 <center>
    <span id="welcome1"></span>
    <span id="welcome2"></span>
 </center>

 <!-- iframe -->
  <div class="iframe-container">
    <iframe class="iframe" src="https://bauer.uh.edu/" frameboarder="0"></iframe>
  </div>

<!-- form starts here -->
<form name="signup" id="signup" action="thankyou.html" onsubmit="return validateForm()" novalidate>
    <center>
        <div class="format">
            <table>
                <tr>
                    <th colspan="2">Create Patient Portal Account</th>
                </tr>

                <!-- patient's information section of the form starts here -->

                <!-- patient's name F M L -->

         
                <tr>
                     <td class="td1"><label for="fname">First Name:</label></td>
                     <td>
                        <input 
                        type="text" 
                        name="fname" 
                        id="fname"
                        minlength="1" 
                        maxlength="30" 
                        title="Letters, dashes, and apostrophes only"
                        pattern="[a-zA-Z']{1,30}"
                        onblur="validateFname()" 
                        placeholder="First Name"
                        required
                        />
                        <br>
                        <span class="error" id="fname-error"></span>
                     </td>
                </tr>
                
                <tr>
                     <td class="td1"><label for="mname">Middle Initial:</label></td>
                     <td>
                        <input 
                        type="text" 
                        name="mname" 
                        id="mname" 
                        minlength="0"
                        maxlength="1"
                        title="Letters only"
                        pattern="[a-zA-Z']{0,1}"
                        onblur="validateMname()"
                        placeholder="MI"
                        />
                        <br>
                        <span class="error" id="mname-error"></span>
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="lname">Last Name:</label></td>
                    <td>
                        <input 
                        type="text" 
                        name="lname" 
                        id="lname" 
                        minlength="1"
                        maxlength="30" 
                        title="Letters, dashes, and apostrophes only"
                        pattern="[a-zA-Z']{1,30}"
                        onblur="validateLname()"
                        placeholder="Last Name"
                        required
                        />
                        <br>
                        <span class="error" id="lname-error"></span>
                    </td>
                </tr>
            
                <!-- gender -->

                <tr>
                    <td class="td1"><label for="pgender">Gender:</label></td>
                    <td>
                        <input 
                        type="radio" 
                        id="g1" 
                        name="pgender" 
                        value="Male"
                        />
                        Male

                        <input 
                        type="radio" 
                        id="g2" 
                        name="pgender" 
                        value="Female"
                        />
                        Female

                        <input 
                        type="radio" 
                        id="g3" 
                        name="pgender" 
                        value="Other"
                        />
                        Other
                    </td>
                </tr>

                <!-- date of birth -->

                <tr>
                    <td class="td1"><label for="dob">Date of Birth:</label></td>
                    <td>
                        <input 
                        type="date" 
                        id="dob" 
                        name="dob"
                        onblur="validateDob()"
                        title="Please enter your date of birth"
                        placeholder="MM/DD/YYYY"
                        required
                        />
                        <br>
                        <span class="error" id="dob-error"></span>
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="ssn">Social Security Number:</label></td>
                    <td>
                        <input 
                        type="password" 
                        id="ssn" 
                        name="ssn"
                        minlength="11" 
                        maxlength="11" 
                        title="Numbers Only"
                        pattern="[0-9]{3}-[0-9]{2}-[0-9]{4}"
                        placeholder="XXX-XX-XXXX"
                        onblur="validateSsn()"
                        required
                        />
                        <br>
                        <span class="error" id="ssn-error"></span>
                    </td>
                </tr>

                <tr>
                    <th colspan="4"></hr></th> <!-- this makes a line allowing it to be more organized-->
                </tr>

                <tr>
                    <th colspan="2"> Patient Contact Information</th>
                </tr>

                <!-- phone number -->

                 <tr>
		            <td class="td1"><label for="phone">Phone Number:</label></td>
                    <td>
                        <input 
                        type="text" 
                        name="phone" 
                        id="phone" 
                        pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" 
                        maxlength="12" 
                        title="Please enter your phone number" 
                        placeholder="123-456-7890"
                        onblur="validatePhone()"
                        required
                        />
                        <br>
                        <span class="error" id="phone-error"></span>
                    </td>
                </tr>

                <!-- email address -->
                 
                <tr>
                    <td class="td1"><label for="email">Email Address:</label></td>
                    <td>
                        <input 
                        type="text" 
                        id="email" 
                        name="email"
                        maxlength="50"
                        title="Please enter your email"
                        placeholder="example@email.com"
                        pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,20}$"
                        onblur="validateEmail()"
                        required
                        />
                        <span class="error" id="email-error"></span>
                    </td>
                </tr>

                <!-- address -->

                <tr>
                    <td class="td1"><label for="address1">Address Line 1:</label></td>
                    <td>
                        <input 
                        type="text" 
                        name="address1" 
                        id="address1" 
                        maxlength="30" 
                        title="Letters, dashes, and apostrophes only"
                        onblur="validateAddress1()"
                        required 
                        placeholder="1234 Address"
                        />
                        <br>
                        <span class="error" id="address1-error"></span>
                    </td>
                </tr>
                
                <tr>
                    <td class="td1"><label for="address2">Address Line 2:</label></td>
                    <td>
                        <input 
                        type="text" 
                        name="address2" 
                        id="address2" 
                        maxlength="30"
                        title="Please enter your address" 

                        placeholder="1234 Address"
                        />
                    </td>
                </tr>

               <!-- city -->

                <tr>
                    <td class="td1"><label for="city">City:</label></td>
                    <td>
                        <input 
                        type="text" 
                        name="city" 
                        id="city" 
                        minlength="1"
                        maxlength="30" 
                        title="Please enter your city"
                        placeholder="City"
                        onblur="validateCity()"
                        required 
                        />
                        <br>
                        <span class="error" id="city-error"></span>
                    </td>
                </tr>

                <!--state -->

                <tr>
                    <td class="td1"><label for="state">State:</label></td>
                    <td>
                        <select id="state" name="state">
                            <option selected disabled>Loading states...</option>
                        </select>
                        <br>
                        <span class="error" id="state-error"></span>
                <!-- zip code -->

                <tr>
                    <td class="td1"><label for="zip">Zip Code:</label></td>
                    <td>
                        <input 
                            type="text" 
                            id="zip" 
                            name="zip" 
                            maxlength="5"
                            pattern="[0-9]{5}"
                            title="Numbers Only" 
                            placeholder="12345"
                            onblur="validateZip()"
                            required 
                            />
                            <br>
                            <span class="error" id="zip-error"></span>
                    </td>
                </tr>

                <tr>
                    <th colspan="4"></hr></th>
                </tr>
                
                <!-- patient background-->

                <tr>
                    <th colspan="2">Patient History</hr></th>
                </tr>
                
                 <tr>
                    <td class="td1"><label for="vacc">Have you been vaccinated?:</label></td>
                    <td>
                        <input 
                        type="radio" 
                        id="v1" 
                        name="vacc" 
                        value="Yes"
                        />
                        Yes

                        <input 
                        type="radio" 
                        id="v2" 
                        name="vacc" 
                        value="No"
                        />
                        No
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="insur">Do you have insurance?:</label></td>
                    <td>
                        <input 
                        type="radio" 
                        id="i1" 
                        name="insur" 
                        value="Yes"
                        />
                        Yes

                        <input 
                        type="radio" 
                        id="i2" 
                        name="insur" 
                        value="No"
                        />
                        No
                    </td>
                </tr>
                
                <!-- check boxes -->
                <tr>
                    <td class="td1"><label for="history">Do you have:</label></td>
                    <td>
                        <input type="checkbox" id="option1" value="Diabetes"/> 
                        <label for="Diabetes">Diabetes</label>

                        <input type="checkbox" id="option2" value="Hypertension"/>
                        <label for="Hypertension">Hypertension</label>

                        <input type="checkbox" id="option3" value="Asthma">
                        <label for="Asthma">Asthma</label>

                        

                        <input type="checkbox" id="option5" value="Arthritus"/>
                        <label for="Arthritus">Arthritus</label>
                        
                        
                        <input type="checkbox" id="option6" value="Other"/><label for="Other">Other</label>

                    </td>
                </tr>
                
                <!-- text area -->
                <tr>
                    <td class="td1" align="right"> 
                        <label for="notes"> If you selected other please specify.</label>
                    </td>

                    <td>
                        <textarea
                        rows="4"
                        cols="50"
                        maxlength="500"
                        id="notes"
                        name="notes"
                        title="Enter any additional medical history or concerns here"
                        placeholder="(Insert text here...)"
                        ></textarea>
                        <span id="description_text"></span>
                    </td>
                </tr>
                
                <!-- slider -->

                <tr>
                    <td class="td1"><label for="range">How is your health?<br/>(Rate from 1 to 10, 10 is healthy)</label></td>
                    <td>
	                    <input
	                    type="range"
	                    name="range"
	                    id="range"
                        min="1"
                        max="10"
                        value="0"
                        required
                        />
                        <span id="range-slider"></span>
                    </td>
                </tr>
                
                <tr>
                    <th colspan="4">Make Patient Account</hr></th>
                </tr>

                <tr>
                    <td class="td1"><label for="username">User ID:</label></td>
                    <td>
                        <input
                        type="text"
                        name="username"
                        id="username"
                        minlength="5"
                        maxlength="30"
                        title="Username must contain at least 5 characters, and cannot start with a number"
                        placeholder="Your username"
                        onblur="validateUsername()"
                        required
                        />
                        <br>
                        <span class="error" id="username-error"></span>
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="pass">Password:</label></td>
                    <td>
                        <input 
                        type="password" 
                        name="pass" 
                        id="pass" 
                        minlength="8"
                        maxlength="30"
                        title="Password must contain at least 8 characters, one uppercase letter, one number, one lowercase letter, and one special character"
                        placeholder="Your password"
                        onblur="validatePass()"
                        oninput="validatePass()"
                        onfocus="validatePass()"
                        required
                        />
                    </br>
                        <span class="error" id="pass1-error"></span>
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="cpass">Re-enter Password:</label></td>
                    <td>
                        <input 
                        type="password" 
                        name="cpass" 
                        id="cpass" 
                        minlength="8"
                        maxlength="30"
                        title="Please re-enter your password"
                        placeholder="Your password"
                        onblur="confirmPass()"
                        oninput="confirmPass()"
                        onfocus="confirmPass()"
                        required
                        />
                    </br>
                        <span class="error" id="pass2-error"></span>
                    </td>
                </tr>

                <tr>
                    <td class="td1">
                        <label for="remember-me">Remember Me:</label>
                    </td>
                    <td>
                        <input
                            type="checkbox"
                            id="remember-me"
                            name="remember-me"
                            checked
                        />
                    </td>
                </tr>
                
                <tr>
                    <td class="td1" colspan="4">
                    <center>
                        <input type="submit" name="submit" id="submit" style="font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif ">
                        &nbsp;&nbsp;&nbsp; <!--spaces between submit and reset-->
                        <input type="reset" name="reset" id="reset" style="font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif">
                        &nbsp;&nbsp;&nbsp;
                        <input type="button" name="review" id="review" value="Review" style="font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif" onclick="reviewInput()">
                        &nbsp;&nbsp;&nbsp;
                        <input type="button" name="validate" id="validate" value="Validate" style="font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif" onclick="validateForm()"> <!--new-->
                    </center>
                    </td>
                </tr>
            </table>
        </div>

    <div class="pass-message">
        <span id="msg1"></span> <br/>
        <span id="msg2"></span> <br/>
        <span id="msg3"></span> <br/>
        <span id="msg4"></span> <br/>
        <span id="msg5"></span> <br/>
        <span id="msg6"></span> <br/>
        <span id="msg7"></span> <br/>
        <span id="pass2-error"></span> <br/>
    </div>

        <center>
        <p id="showInput"></p>
        </center>

    </center>
    
</form>

<!-- footer goes here -->

<iframe src="footer.html" width="100%" height="100px" title="footer"></iframe>
<script src="hw4.js"></script>

<!-- displays an alert box if requirements are not met -->
 <div id="alert-box">
    <div id="alert-content">
        <h4>Please complete all required fields</h4>
        <button id="close-alert">Ok</button>
    </div>
 </div>
    </body>
</html>
